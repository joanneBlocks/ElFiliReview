<style>

// ============================================================

// 30 tanong bawat kabanata
// Uri: mc=Multiple Choice, tf=True/False, sa=Short Answer,

const CHAPTERS = {

// ─────────────────────────────────────────────────────────────
// KABANATA 26 — Ang Paskin
// ─────────────────────────────────────────────────────────────
26: {
  title: "Kabanata 26: Ang Paskin",
  kaisipan: "Ang katapangan, katapatan at kalakasan ng loob ay makikita sa pagharap sa mga pagsubok.",
  questions: [
    { type:"mc", q:"Saan nagtagpo sina Simoun at Basilio sa Kabanata 26?", choices:["Sa bahay ni Kapitan Tiago","Sa libingan ni Maria Clara","Sa likod ng simbahan","Sa ospital"], ans:1 },
    { type:"tf", q:"Si Simoun ay si Crisostomo Ibarra na nagbago ng pangalan at anyo.", ans:true },
    { type:"mc", q:"Si Basilio ay estudyante ng anong larangan?", choices:["Abogasya","Medisina","Teolohiya","Inhinyeriya"], ans:1 },
    { type:"tf", q:"Si Basilio ay agad na sumang-ayon sa plano ni Simoun nang walang pag-aalangan.", ans:false },
    { type:"mc", q:"Anong okasyon ang pinlano ni Simoun bilang tagpo ng kanyang pagsabog?", choices:["Kaarawan ng Kapitan Heneral","Fiesta ng lungsod","Isang kasiyahan ng mga mayayaman","Handaan ng mga prayle"], ans:2 },
    { type:"tf", q:"Ang bomba ni Simoun ay nakalagay sa isang eskultura o ilaw na lampara.", ans:true },
    { type:"mc", q:"Sino ang binanggit ni Simoun bilang inspirasyon ng kanyang paghihiganti?", choices:["Ang kanyang ama","Maria Clara at Elias","Kabesang Tales","Padre Florentino"], ans:1 },
    { type:"tf", q:"Ang Kabanata 26 ay nagtatakda ng simula ng pinakamataas na tensyon sa nobela.", ans:true },
    { type:"mc", q:"Anong damdamin ang naramdaman ni Basilio nang malaman ang tunay na pagkakakilanlan ni Simoun?", choices:["Kagalakan","Pagkagulat at pangamba","Galit","Pagmamahal"], ans:1 },
    { type:"tf", q:"Si Simoun ay nagpapakita ng pagmamahal sa mga Pilipino sa pamamagitan ng kanyang plano.", ans:true },
    { type:"mc", q:"Anong tema ang pinaka-prominente sa Kabanata 26?", choices:["Pagmamahal","Paghihiganti at kalayaan","Pamilya","Relihiyon"], ans:1 },
    { type:"tf", q:"Ang Kabanata 26 ay nagpapakita ng kumplikadong pagkatao ni Simoun.", ans:true },
    { type:"mc", q:"Kung hindi tutulungan ni Basilio si Simoun, anong sinabi ni Simoun?", choices:["Iuulat siya sa gobyerno","Patayin ang lahat ng estudyante","Walang sinabi — hihiling lamang ng iba","Aakusahan siya ng krimen"], ans:2 },
    { type:"tf", q:"Ang paskin o polyeto na nabanggit sa kabanatang ito ay nagpapahayag ng mapanghimagsik na kaisipan.", ans:true },
    { type:"mc", q:"Anong simbolo ang ginamit ni Simoun upang ilarawan ang kalagayan ng Pilipinas?", choices:["Isang ibon sa hawla","Isang punong nabubulok","Isang apoy na malapit nang mamatay","Isang dagat na mapurol"], ans:1 },
    { type:"tf", q:"Si Basilio ay may malalim na pag-aalangan dahil sa kanyang pag-ibig kay Juli.", ans:true },
    { type:"mc", q:"Ano ang pangunahing motibo ni Simoun sa paghihiganti?", choices:["Pansariling kayamanan","Paghihiganti at pagpapalaya sa mga Pilipino mula sa pang-aabuso","Pagpatay sa mga Espanyol","Paghahari sa Pilipinas"], ans:1 },
    { type:"tf", q:"Ang kaisipan ng Kabanata 26 — katapangan sa pagharap sa pagsubok — ay makikita sa parehong si Simoun at Basilio.", ans:true },
    { type:"mc", q:"Anong katangian ni Simoun ang pinaka-kapansin-pansin sa Kabanata 26?", choices:["Mapagmahal","Mapaghiganti ngunit may layunin ng kalayaan","Mapagbigay","Mapagpatawad"], ans:1 },
    { type:"tf", q:"Ang mga pangyayari sa Kabanata 26 ay nagpapakita ng epekto ng matagal na pagdurusa sa isang tao.", ans:true },
    { type:"mc", q:"Ang eksena ng pag-uusap nina Simoun at Basilio ay nagaganap sa anong oras?", choices:["Madaling araw","Katanghalian","Gabi","Hapon"], ans:2 },
    { type:"tf", q:"Ang tunay na pagkakakilanlan ni Simoun ay kaalaman ng lahat sa Kabanata 26.", ans:false },
    { type:"en", q:"Ilista ang TATLONG pangunahing motibo ni Simoun sa paghihiganti ayon sa Kabanata 26.", ans:["Paghihiganti para sa pagkamatay ni Elias","Paghihiganti dahil sa kanyang pagkakulong at pagkatapon","Pagpapalaya sa mga Pilipino mula sa pang-aabuso ng kolonyal na sistema"], count:3 },
    { type:"tf", q:"Si Basilio ay nagpapakita ng mas maingat at makatotohanang pananaw kaysa kay Simoun.", ans:true },
    { type:"mc", q:"Anong nais ni Simoun para sa resulta ng pagsabog?", choices:["Pagkawasak lamang","Rebolusyon at kalayaan ng Pilipinas","Paghahari niya sa Pilipinas","Pagsugpo sa mga prayle"], ans:1 },
    { type:"tf", q:"Ang Kabanata 26 ay nagpapakita na ang matagal na pag-aabuso ay maaaring lumikha ng desperasyon sa isang tao.", ans:true },
    { type:"mc", q:"Paano nababago ang relasyon ni Basilio at Simoun sa Kabanata 26?", choices:["Nanatiling pantay","Mula sa pagtataka tungo sa komplikadong halo ng takot at paggalang","Naging magkaibigang malapit","Naging magkaaway"], ans:1 },
    { type:"tf", q:"Ang Kabanata 26 ay nagpapakita ng moral na dilemang kinakaharap ng kabataang Pilipino sa panahon ng kolonyalismo.", ans:true },
    { type:"sa", q:"Ilarawan si Simoun batay sa Kabanata 26 at ang kanyang layunin sa pagbabalik sa Pilipinas.", ans:"Si Simoun ay si Crisostomo Ibarra na nagbago ng anyo at pangalan. Bumalik siya sa Pilipinas bilang isang mayamang negosyante upang maghiganti at maglunsad ng rebolusyon, gamit ang kanyang kayamanan at impluwensya upang ilantad at wasakin ang sistemang nag-abuso sa kanya at sa kanyang mga mahal sa buhay." },
    { type:"la", q:"Talakayin ang moral na katanungan sa Kabanata 26: tama ba ang paraan ng paghihiganti na pinili ni Simoun? Ipaliwanag gamit ang mga pangyayari sa kabanatang ito.", ans:"Ang sagot ay dapat talakayin ang dalawang panig: ang katwiran ni Simoun (ang sistema ay masama at kailangan ng radikal na pagbabago) at ang mga suliranin ng kanyang paraan (maaaring masaktan ang mga inosente, ang karahasan ay maaaring lumikha ng mas malaking karahasan). Dapat ding talakayin ang alternatibo na mapayapang pagbabago." }
  ]
},

// ─────────────────────────────────────────────────────────────
// KABANATA 27 — Ang Prayle at ang Pilipino
// ─────────────────────────────────────────────────────────────
27: {
  title: "Kabanata 27: Ang Prayle at ang Pilipino",
  kaisipan: "Huwag mangamba sa pagpapahayag ng kaisipan, paniniwala, opinyon, ideya lalo nat alam mo na ikaw ay nasa tama.",
  questions: [
    { type:"mc", q:"Anong pangunahing paksa ang tinalakay sa Kabanata 27?", choices:["Edukasyon","Ang relasyon ng kapangyarihan ng prayle at ang Pilipino","Kayamanan","Pag-ibig"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng mapayapang relasyon ng prayle at ng Pilipino.", ans:false },
    { type:"mc", q:"Anong kaisipan ang pangunahin sa Kabanata 27?", choices:["Huwag magpahayag ng saloobin","Huwag mangamba sa pagpapahayag ng tamang kaisipan at paniniwala","Ang mga prayle ay laging tama","Ang mga Pilipino ay walang karapatan"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng pang-aabuso ng kapangyarihan ng simbahan.", ans:true },
    { type:"mc", q:"Anong uri ng kapangyarihan ang taglay ng mga prayle sa panahon ng kolonyalismo?", choices:["Pangmilitar","Panlipunan, relihiyoso, at pampulitika","Pangkalakal","Pangekonomya lamang"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng kahalagahan ng kalayaan ng pamamahayag.", ans:true },
    { type:"mc", q:"Paano ginagamit ng mga prayle ang kanilang kapangyarihan ayon sa Kabanata 27?", choices:["Para tulungan ang mga Pilipino","Para kontrolin ang isipan at kilos ng mga Pilipino","Para magturo","Para magbigay ng tulong sa mahihirap"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng lakas ng loob na kailangan upang ipahayag ang tama.", ans:true },
    { type:"mc", q:"Anong aspeto ng kolonyal na sistema ang pinakamaselang pinuna sa Kabanata 27?", choices:["Edukasyon","Ang pagsasanib ng relihiyosong kapangyarihan at kolonyal na kontrol","Kalakalan","Militar"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang takot sa mga prayle ay pinanatili ng sistemang kolonyal.", ans:true },
    { type:"mc", q:"Anong mensahe ang nais ipaabot ni Rizal tungkol sa kalayaan ng pamamahayag?", choices:["Huwag magpahayag ng opinyon","Ang kalayaan ng pamamahayag ay isang karapatang dapat ipagtanggol kahit may panganib","Ang kalayaan ay walang kabuluhan","Ang simbahan ang magtatakda ng lahat"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang kapangyarihan ng simbahan ay ginagamit para sa kabutihan ng mga Pilipino.", ans:false },
    { type:"mc", q:"Paano maaaring labanan ang pang-aabuso ng kapangyarihan ng simbahan ayon sa Kabanata 27?", choices:["Sa pamamagitan ng karahasan","Sa pamamagitan ng lakas ng loob na ipahayag ang katotohanan","Sa pamamagitan ng pagtakas","Sa pamamagitan ng pagbabago ng relihiyon"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng komplikadong papel ng relihiyon sa lipunang kolonyal.", ans:true },
    { type:"mc", q:"Sino ang mga tauhang nagpapakita ng lakas ng loob sa Kabanata 27?", choices:["Mga prayle","Ilang Pilipinong hindi natakot ipahayag ang katotohanan","Mga opisyal ng pamahalaan","Mga mangangalakal"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang kalayaan ng pamamahayag ay pangunahing kondisyon ng tunay na kalayaan.", ans:true },
    { type:"mc", q:"Anong uri ng pagpuna ang ginagamit ni Rizal sa Kabanata 27?", choices:["Direktang pagpuna sa relihiyon","Pagpuna sa paggamit ng relihiyon bilang instrumento ng kolonyal na kontrol","Pagpuna sa mga Pilipino","Pagpuna sa España"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng kaibahan ng tunay na relihiyon at ng relihiyong ginagamit para sa kapangyarihan.", ans:true },
    { type:"mc", q:"Anong katangian ang dapat taglay ng isang mamamayang nagtatanggol ng kanyang karapatang magpahayag?", choices:["Kayamanan","Lakas ng loob at determinasyon","Koneksyon sa mga prayle","Pag-aral ng teolohiya"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang pagsasanib ng kapangyarihang relihiyoso at pampulitika ay mapanganib sa kalayaan.", ans:true },
    { type:"en", q:"Ilista ang TATLONG paraan ng pagkontrol ng mga prayle sa mga Pilipino ayon sa Kabanata 27.", ans:["Pagkontrol sa relihiyosong buhay ng mga tao","Paggamit ng takot at pag-excommunicate","Pakikialam sa pampulitikang desisyon ng pamahalaan"], count:3 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang intellectual freedom o kalayaan ng isipan ay mahalaga sa pambansang kalayaan.", ans:true },
    { type:"mc", q:"Anong simbolismo ang makikita sa relasyon ng prayle at ng Pilipino sa Kabanata 27?", choices:["Pagkakapantay-pantay","Ang hindi pantay na kapangyarihan ng kolonisador at kolonisado","Pagkakaibigan","Pakikipagtulungan"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay may direktang kaugnayan sa karanasan ni Rizal bilang isang manunulat na pinersekuto.", ans:true },
    { type:"mc", q:"Anong aral ang makukuha mula sa Kabanata 27?", choices:["Manahimik at huwag magpahayag","Ang lakas ng loob na ipahayag ang katotohanan ay isang uri ng pakikibaka para sa kalayaan","Sumunod sa lahat ng utos ng prayle","Huwag kailanman sumuway"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita na ang pagsasama ng Estado at Simbahan ay lumilikha ng pinaka-makapangyarihang anyo ng kontrol.", ans:true },
    { type:"mc", q:"Paano naiugnay ang Kabanata 27 sa modernong usapin ng freedom of expression?", choices:["Walang kaugnayan","Ang karapatang ipahayag ang sariling pananaw ay nananatiling buhay na usapin hanggang sa kasalukuyan","Ito ay lumang usapin na","Ito ay para lamang sa mga intelektwal"], ans:1 },
    { type:"tf", q:"Ang Kabanata 27 ay nagpapakita ng kabayanihang intelektwal bilang isang uri ng katapangan.", ans:true },
    { type:"sa", q:"Paano ipinakita ng Kabanata 27 ang pagsasanib ng relihiyosong at pampulitikang kapangyarihan sa kolonyal na Pilipinas?", ans:"Ipinakita ng Kabanata 27 na ang mga prayle ay nagtataglay ng parehong relihiyosong at pampulitikang kapangyarihan — sila ay gaya ng mga kinatawan ng Diyos at ng Estado sa iisang tao. Ang ganitong pagsasanib ng kapangyarihan ay nagbibigay sa kanila ng kakayahang kontrolin ang halos lahat ng aspeto ng buhay ng mga Pilipino." },

// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────

  title: "Kabanata 28: Pagkatakot",

  questions: [
    { type:"mc", q:"Anong pangunahing tema ang tinalakay sa Kabanata 28?", choices:["Pag-ibig","Ang epekto ng takot at ng mga maling balita sa lipunan","Kayamanan","Edukasyon"], ans:1 },
    { type:"tf", q:"Ang Kabanata 28 ay nagpapakita ng kapayapaan at kaayusan sa lipunan.", ans:false },

    { type:"tf", q:"Ang Kabanata 28 ay nagpapakita na ang takot ay maaaring gamitin bilang instrumento ng kontrol.", ans:true },
    { type:"mc", q:"Paano ipinakita ang epekto ng maling balita sa Kabanata 28?", choices:["Sa pamamagitan ng kagalakan ng tao","Sa pamamagitan ng takot, kaguluhan, at hindi tamang reaksyon ng mga tao","Sa pamamagitan ng katahimikan","Sa pamamagitan ng kasaganaan"], ans:1 },

      h+='<div class="tf-btns">';
      h+='<button class="'+tC+'" onclick="pickTF(\''+k+'\',true,'+q.ans+')">&#10003; Tama</button>';
      h+='<button class="'+fC+'" onclick="pickTF(\''+k+'\',false,'+q.ans+')">&#10007; Mali</button>';
      h+='</div>';
      h+='<div class="actions">';
      h+='<button class="btn-check" onclick="autoCheck(\''+k+'\','+qi+')">&#10003; Suriin</button>';
      h+='<button class="btn-key" onclick="showKey(\''+k+'\','+qi+')">&#128273; Ipakita Sagot</button>';
      h+='</div>';

    }else if(q.type==='sa'||q.type==='la'){
      var rows=q.type==='la'?5:3;
      var val=answers[k]||'';
      h+='<textarea rows="'+rows+'" id="ta_'+k+'" oninput="saveText(\''+k+'\',this.value)" placeholder="Isulat ang iyong sagot dito...">'+esc(val)+'</textarea>';
      h+='<div class="actions"><button class="btn-key" onclick="showKey(\''+k+'\','+qi+')">&#128273; Ipakita Gabay na Sagot</button></div>';

    }else if(q.type==='en'){
      h+='<div class="enum-rows">';
      for(var i=0;i<q.count;i++){
        var ev=(Array.isArray(answers[k])&&answers[k][i])?answers[k][i]:'';
        var eCls='';
        if(checked[k]&&ev){var kw=(q.ans[i]||'').toLowerCase().split(' ')[0];eCls=ev.toLowerCase().includes(kw)?'e-correct':'e-wrong';}
        h+='<div class="enum-row"><span>'+(i+1)+'.</span>';
        h+='<input type="text" class="'+eCls+'" value="'+esc(ev)+'" placeholder="Sagot '+(i+1)+'" oninput="saveEnum(\''+k+'\','+i+',this.value,'+q.count+')"></div>';
      }
      h+='</div>';
      h+='<div class="actions">';
      h+='<button class="btn-check" onclick="autoCheck(\''+k+'\','+qi+')">&#10003; Suriin</button>';
      h+='<button class="btn-key" onclick="showKey(\''+k+'\','+qi+')">&#128273; Ipakita Sagot</button>';
      h+='</div>';
    }

    var fb=feedbacks[k];
    if(fb)h+='<div class="feedback '+fb.cls+'">'+esc(fb.text)+'</div>';
    h+='</div>';
  });
  document.getElementById('qd').innerHTML=h;
  updateProgress();updateNav();
}

function pickMC(e,k,ci,correct){
  if(checked[k])return;
  answers[k]=ci;updateProgress();
  var card=document.getElementById('card_'+k);
  card.querySelectorAll('.choice').forEach(function(el,i){
    el.className='choice'+(i===ci?' selected':'');
    el.querySelector('input').checked=(i===ci);
  });
}

function pickTF(k,val,correct){
  if(checked[k])return;
  answers[k]=val;updateProgress();
  var card=document.getElementById('card_'+k);
  var btns=card.querySelectorAll('.tf-btn');
  btns[0].className='tf-btn'+(val===true?' sel-t':'');
  btns[1].className='tf-btn'+(val===false?' sel-f':'');
}

function saveText(k,val){answers[k]=val;updateProgress();}

function saveEnum(k,idx,val,count){
  if(!Array.isArray(answers[k]))answers[k]=Array(count).fill('');
  answers[k][idx]=val;updateProgress();
}

function autoCheck(k,qi){
  var q=CHAPTERS[currentChap].questions[qi];
  checked[k]=true;
  var card=document.getElementById('card_'+k);
  if(q.type==='mc'){
    var ok=answers[k]===q.ans;
    feedbacks[k]={text:(ok?'Tama! Sagot: ':'Mali. Tamang sagot: ')+q.choices[q.ans],cls:ok?'fb-correct':'fb-wrong'};
    card.querySelectorAll('.choice').forEach(function(el,ci){
      var cls='choice';
      if(ci===q.ans)cls+=' correct';
      else if(answers[k]===ci)cls+=' wrong';
      el.className=cls;
    });
  }else if(q.type==='tf'){
    var av=answers[k];
    var ok=av===q.ans;
    feedbacks[k]={text:(ok?'Tama! Sagot: ':'Mali. Tamang sagot: ')+(q.ans?'TAMA':'MALI'),cls:ok?'fb-correct':'fb-wrong'};
    var btns=card.querySelectorAll('.tf-btn');
    btns[0].className='tf-btn'+(q.ans===true?' correct':(av===true?' wrong':''));
    btns[1].className='tf-btn'+(q.ans===false?' correct':(av===false?' wrong':''));
  }else if(q.type==='en'){
    var ua=Array.isArray(answers[k])?answers[k]:[];
    var sc=0;
    q.ans.forEach(function(a,i){var kw=a.toLowerCase().split(' ')[0];if((ua[i]||'').toLowerCase().includes(kw))sc++;});
    var ks=q.ans.map(function(a,i){return (i+1)+'. '+a;}).join(' | ');
    feedbacks[k]={text:'Nakuha: '+sc+'/'+q.count+'. Tamang sagot: '+ks,cls:sc===q.count?'fb-correct':sc>0?'fb-partial':'fb-wrong'};
    card.querySelectorAll('.enum-row input').forEach(function(inp,i){
      var kw=(q.ans[i]||'').toLowerCase().split(' ')[0];
      inp.className=inp.value.toLowerCase().includes(kw)?'e-correct':(inp.value?'e-wrong':'');
    });
  }
  document.getElementById('sAuto').textContent=Object.keys(checked).length;
  appendFeedback(k,card);
}

function showKey(k,qi){
  var q=CHAPTERS[currentChap].questions[qi];
  var a='';
  if(q.type==='mc')a=q.choices[q.ans];
  else if(q.type==='tf')a=q.ans?'TAMA':'MALI';
  else if(q.type==='en')a=q.ans.map(function(x,i){return (i+1)+'. '+x;}).join(' | ');
  else a=q.ans;
  feedbacks[k]={text:'Gabay na Sagot: '+a,cls:'fb-key'};
  var card=document.getElementById('card_'+k);
  appendFeedback(k,card);
}

function appendFeedback(k,card){
  if(!card)card=document.getElementById('card_'+k);
  if(!card)return;
  var ex=card.querySelector('.feedback');if(ex)ex.remove();
  var fb=feedbacks[k];
  if(fb){var d=document.createElement('div');d.className='feedback '+fb.cls;d.textContent=fb.text;card.appendChild(d);}
}

function updateProgress(){
  var total=420,ans=Object.keys(answers).length,pct=Math.round(ans/total*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=ans+' / '+total+' nasagot ('+pct+'%)';
  document.getElementById('sAns').textContent=ans;
  if(ans>0)document.getElementById('sb').style.display='flex';
}

function updateNav(){
  var idx=CHAPTER_KEYS.indexOf(currentChap);
  document.getElementById('bPrev').disabled=idx===0;
  document.getElementById('bNext').disabled=idx===CHAPTER_KEYS.length-1;
  var a=Object.keys(answers).filter(function(x){return x.split('_')[0]==currentChap;}).length;
  document.getElementById('ni').textContent='Kabanata '+currentChap+' | '+a+'/30 nasagot';
}

function setChapter(k){currentChap=k;renderTabs();renderChapter();window.scrollTo(0,0);}
function navigate(d){var i=CHAPTER_KEYS.indexOf(currentChap)+d;if(i>=0&&i<CHAPTER_KEYS.length)setChapter(CHAPTER_KEYS[i]);}

renderTabs();renderChapter();

</script>
</body>
